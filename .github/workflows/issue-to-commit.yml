name: Issue -> Commit budget data

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply payload from issue
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python .github/scripts/apply_budget_issue.py

      - name: Commit & push (if changes)
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/transactions.json data/wedding.json
          git commit -m "Update budget data (issue #${{ github.event.issue.number }})"
          git push

          echo "changed=true" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Comment + close issue
        uses: actions/github-script@v7
        with:
          script: |
            const changed = "${{ steps.commit.outputs.changed }}";
            const sha = "${{ steps.commit.outputs.sha }}";
            const issue_number = context.payload.issue.number;

            if (changed === "true") {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body: `✅ Applied payload and committed: ${sha}`
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number,
                state: "closed"
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body: `ℹ️ No changes to commit.`
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number,
                state: "closed"
              });
            }
